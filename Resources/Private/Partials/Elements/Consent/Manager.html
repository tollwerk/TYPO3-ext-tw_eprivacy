<f:comment><!--

    ePrivacy Consent Manager

    @param array[] subjects			Subjects by type
    @param Type[] types				Subject types
    @param Consent consent          Current user's consent status

--></f:comment>
<html xmlns:f="https://xsd.helhum.io/ns/typo3/cms-fluid/master/ViewHelpers"
      xmlns:eprivacy="http://typo3.org/ns/Tollwerk/TwEprivacy/ViewHelpers"
      data-namespace-typo3-fluid="true">
    <f:form action="list" controller="Subject" object="{consent}" class="EprivacyManager">
        <ol class="EprivacyManager__tabs">
            <f:for each="{types}" as="type">
                <li class="EprivacyManager__tab">
                    <a href="#eprivacy-{type.uid}">{type.title}</a>
                </li>
            </f:for>
        </ol>
        <f:for each="{subjects}" as="subjectsByType">
            <fieldset class="EprivacyManager__tab-panel" id="eprivacy-{subjectsByType.0.type.uid}">
                <legend>
                    <h3>{eprivacy:subjectTypeTitle(types: types, type: subjectsByType.0.type.uid)}</h3>
                </legend>
                <ol class="EprivacyManager__subjects">
                    <f:for each="{subjectsByType}" as="subject">
                        <f:render section="Subject" arguments="{
                            subject: subject,
                            subjectsByType: subjectsByType,
                            types: types,
                            consent: consent
                        }"/>
                    </f:for>
                </ol>
            </fieldset>
        </f:for>
        <div class="EprivacyManager__controls">
            <f:form.button type="submit" name="update" value="1" class="EprivacyManager__controls EprivacyManager__controls--update">
                <f:translate key="eprivacy.update.update"/>
            </f:form.button>
            <f:form.button type="submit" name="update" value="2" class="EprivacyManager__controls EprivacyManager__controls--accept">
                <f:translate key="eprivacy.update.accept"/>
            </f:form.button>
            <f:form.button type="submit" name="update" value="3" class="EprivacyManager__controls EprivacyManager__controls--deny">
                <f:translate key="eprivacy.update.deny"/>
            </f:form.button>
            <f:form.button type="reset" class="EprivacyManager__controls EprivacyManager__controls--reset">
                <f:translate key="eprivacy.update.reset"/>
            </f:form.button>
        </div>
    </f:form>

    <f:comment><!--

        Render a subject

        @param Subject subject              Subject
        @param Subject[] subjectsByType     Subjects by type
        @param Type[] types				    Subject types
        @param Consent consent              Current user's consent status

    --></f:comment>
    <f:section name="Subject">
        <li class="EprivacyManager__subject">
            <f:if condition="{subjectsByType.0.type.needsConsent}">
                <f:then>
                    <f:form.checkbox name="subjects[]" property="subjects" value="{subject.identifier}"
                                     id="eprivacy-{subject.identifier}"
                                     checked="{eprivacy:consentAllowsSubject(consent: consent, subject: subject.identifier)}"/>
                </f:then>
                <f:else>
                    <f:form.checkbox name="subjects[]" property="subjects" value="{subject.identifier}"
                                     checked="1" disabled="1"
                                     id="eprivacy-{subject.identifier}"/>
                </f:else>
            </f:if>
            <label class="EprivacyManager__subject-label" for="eprivacy-{subject.identifier}">
                <h4 id="EprivacyManager__subject-title">{subject.title}</h4>
                <dl>
                    <dt class="EprivacyManager__subject-name-label">
                        <f:translate key="eprivacy.subject.name"/>
                    </dt>
                    <dd class="EprivacyManager__subject-name">{subject.name}</dd>
                    <f:if condition="{subject.mode}">
                        <f:else>
                            <f:render section="Cookie" arguments="{subject: subject}"/>
                        </f:else>
                    </f:if>
                    <dt class="EprivacyManager__subject-purpose-label">
                        <f:translate key="eprivacy.subject.purpose"/>
                    </dt>
                    <dd class="EprivacyManager__subject-purpose">
                        <f:format.html>{subject.purpose}</f:format.html>
                    </dd>
                </dl>
            </label>
        </li>
    </f:section>

    <f:comment><!--

        Render cookie subject properties

        @param Subject subject              Subject

    --></f:comment>
    <f:section name="Cookie">
        <dt class="EprivacyManager__subject-provider-label">
            <f:translate key="eprivacy.subject.provider"/>
        </dt>
        <dd class="EprivacyManager__subject-provider">{subject.provider}</dd>
        <dt class="EprivacyManager__subject-lifetime-label">
            <f:translate key="eprivacy.subject.lifetime"/>
        </dt>
        <dd class="EprivacyManager__subject-lifetime">
            <f:if condition="{subject.session}">
                <f:then>
                    <f:translate key="eprivacy.subject.lifetime.session"/>
                </f:then>
                <f:else>{eprivacy:format.duration(seconds: subject.lifetime)}</f:else>
            </f:if>
        </dd>
    </f:section>
</html>
